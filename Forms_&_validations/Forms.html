<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- CSS Interno apenas para visualizar diferenças nos forms -->
    <style>
            input:invalid {
            border: 2px dashed red;
            }

            input:valid {
            border: 2px solid black;
            }
            input:invalid:required {
            background-image: linear-gradient(to right, pink, lightgreen);
            }
    </style>
</head>
<body>
    
                <!-- CÓDIGOS DO MDN MOZILLA DOCUMENTATION -->


<!-- criação dos forms para validação-->
<form>
    <label for="choose"> Would you prefer a banana or a cherry? (required)</label>
       <!---- <input id="choose" name="i_like" required pattern="[Bb]anana|[Cc]herry"> -->
        <div>
          <input type="text" id="escolha" name="eu_like" required minlength="6" maxlength="6">
        </div>
        <div>
            <label for="number"> How many would you like?</label>
            <input type="number" id="number" name="amount" value="1" min="1" max="10">
        </div>
        <div>
            <button> Submit </button>
        </div>
</form>

<form>
    <label for="mail">I would like you to provide me with an e-mail address:</label>
    <input type="email" id="mail" name="mail">
    <button>Submit</button>
  </form>

  <!-- JS interno para validações-->
<script>
     const email = document.getElementById("mail");

     email.addEventListener("input", (event) => {
        if (email.validity.typeMismatch){
            email.setCustomValidity("I am expecting an e-mails address!");
            email.reportValidity();
        } else { 
            email.setCustomValidity("");
        }
     });

</script>
</body>
</html>
